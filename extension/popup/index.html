<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VelseAI Co-Pilot</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #020617;
      color: #f8fafc;
      overflow-x: hidden;
    }
    .header {
      padding: 16px;
      background: linear-gradient(to right, #7c3aed, #059669);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -1px;
    }
    .content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .job-card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 12px;
    }
    .job-title {
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      margin-bottom: 4px;
    }
    .job-company {
      font-size: 12px;
      color: #94a3b8;
    }
    .btn {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #6d28d9;
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-top: 8px;
      text-align: center;
    }
    .error {
      color: #ef4444;
      font-size: 11px;
      padding: 8px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 6px;
      display: none;
    }
    #loading {
      display: none;
    }
  </style>
</head>
<body>
  <div className="header">
    <div className="logo">VELSEAI</div>
    <div style="font-size: 10px; opacity: 0.7;">CO-PILOT</div>
  </div>

  <div className="content">
    <div id="jobPreview" class="job-card">
      <div id="noJob" style="text-align: center; padding: 20px; color: #64748b; font-size: 12px;">
        Navigate to a job page on LinkedIn or Indeed to start.
      </div>
      <div id="jobFound" style="display: none;">
        <div id="displayTitle" class="job-title">Extracting...</div>
        <div id="displayCompany" class="job-company">---</div>
      </div>
    </div>

    <div id="error" class="error"></div>

    <button id="saveBtn" class="btn" disabled>
      <span id="btnText">Save to Dashboard</span>
      <span id="loading" style="display:none;">Saving...</span>
    </button>

    <div id="status" class="status">NOT CONNECTED</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
